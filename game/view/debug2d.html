<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>THE HOUSE — 2D Debug Bench</title>
<style>
  body{ margin:0; background:#0b0d12; color:#cfe0ea;
        font-family:Menlo,Consolas,monospace; display:flex; flex-direction:column;
        align-items:center; gap:10px; padding:14px; }
  h1{ font-size:14px; letter-spacing:3px; color:#e0b85c; margin:2px; }
  .bar{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center; }
  button{ background:#1b2530; color:#cfe0ea; border:1px solid #2c3a48;
          border-radius:5px; padding:5px 10px; font:inherit; font-size:12px; cursor:pointer; }
  button.on{ background:#2d5070; border-color:#5a86b0; color:#fff; }
  #err{ color:#ff8888; white-space:pre-wrap; font-size:12px; }
  canvas{ border:1px solid #243040; border-radius:6px; background:#0a0c10; }
  .stage{ display:flex; gap:12px; align-items:flex-start; }
  .panel{ width:300px; font-size:11px; line-height:1.5; }
  .panel h2{ font-size:10px; letter-spacing:2px; color:#5fb6d6; border-bottom:1px solid #233; padding-bottom:3px; margin:10px 0 5px; }
  .row{ display:flex; justify-content:space-between; gap:6px; }
  .legend{ font-size:11px; color:#6b8494; max-width:760px; text-align:center; }
  .think{ color:#9fb4c0; }
</style>
</head>
<body>
  <h1>THE HOUSE ALWAYS WINS — 2D DEBUG BENCH</h1>
  <div class="bar" id="floors"></div>
  <div class="bar">
    <button id="play">⏸ Pause</button>
    <button id="routes" class="on">routes ✓</button>
    <span id="status" class="legend"></span>
  </div>
  <div class="stage">
    <canvas id="c"></canvas>
    <div class="panel" id="panel"></div>
  </div>
  <div class="legend">guards = red (sweeping line-of-sight cones) · cameras = amber · crew = colored dots ·
    dashed = path · faint = candidate routes scored (✓ = chosen)</div>
  <pre id="err"></pre>

<script type="module">
import { makeRng } from '../sim/rng.js';
import * as world from '../sim/world.js';
import { coneRays } from '../sim/perception.js';
import { initialGuards, initialCams, initialCrew, initialStaff } from '../sim/agents.js';
import { stepGuards, securityGapOpen } from '../sim/guards.js';
import { assignObjectives, stepCrew, threatAt } from '../sim/navigation.js';
import { stepStaffAll } from '../sim/staff.js';
import { initHeist, stepHeist } from '../sim/mechanics.js';
import { initCustomers, stepCustomers } from '../sim/customers.js';
import { stampFurniture } from '../sim/obstacles.js';

const err = document.getElementById('err');
try {
  const levels = await (await fetch('/design/levels.json')).json();
  const rooms  = await (await fetch('/design/level_rooms.json')).json();
  const furniture = await (await fetch('/design/furniture.json')).json();
  stampFurniture(levels, furniture);   // furniture is solid — agents route/see around it
  const { W, H } = world.dims(levels);
  const T = 12;
  const TILE_COL = { 0:'#23252e',1:'#12131a',2:'#4a3a2a',3:'#2f4a3a',4:'#46412e',
                     5:'#3c2e22',6:'#2c1f28',7:'#2e2c3a',8:'#212329',9:'#5a4418' };

  const canvas = document.getElementById('c');
  canvas.width = W * T; canvas.height = H * T;
  const ctx = canvas.getContext('2d');

  const rng = makeRng(2026);
  let guards, cams, staff, crew, heist, customers;
  const simctx = { frame: 0, calls: [] };
  let attempt = 1, failBeat = 0;

  // (re)start a run. The rng stream is NOT reset, so each attempt plays out
  // differently — caught = fail, and the heist starts over until it goes clean.
  function resetRun() {
    guards = initialGuards();
    cams = initialCams();
    staff = initialStaff();
    crew = initialCrew(rooms);
    assignObjectives(crew, rooms);
    customers = initCustomers(levels, rooms, rng);
    heist = initHeist();
    simctx.calls = []; simctx.securityCalled = false;
  }
  resetRun();

  let view = 'floor1', paused = false, showRoutes = true, frame = 0;

  const fbar = document.getElementById('floors');
  world.FLOOR_ORDER.forEach(f => {
    const b = document.createElement('button');
    b.textContent = rooms.floors[f].label;
    b.dataset.floor = f;
    b.onclick = () => { view = f; sync(); };
    fbar.appendChild(b);
  });
  const sync = () => [...fbar.children].forEach(b => b.classList.toggle('on', b.dataset.floor === view));
  sync();
  document.getElementById('play').onclick = e => { paused = !paused; e.target.textContent = paused ? '▶ Play' : '⏸ Pause'; };
  document.getElementById('routes').onclick = e => { showRoutes = !showRoutes; e.target.classList.toggle('on', showRoutes); e.target.textContent = showRoutes ? 'routes ✓' : 'routes'; };

  const cone = (ox, oy, dir, fov, range, floor, fill) => {
    const pts = coneRays(world.grid(levels, floor), W, H, ox, oy, dir, fov, range, 26);
    ctx.beginPath(); ctx.moveTo(ox * T, oy * T);
    pts.forEach(p => ctx.lineTo(p.x * T, p.y * T));
    ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
  };
  const polyline = (pts, from, color, w, dash) => {
    if (!pts || pts.length === 0) return;
    ctx.strokeStyle = color; ctx.lineWidth = w; ctx.setLineDash(dash);
    ctx.beginPath(); ctx.moveTo(from.x * T, from.y * T);
    pts.forEach(p => ctx.lineTo((p.x + 0) * T, (p.y + 0) * T));
    ctx.stroke(); ctx.setLineDash([]);
  };

  // furniture — non-blocking decorative props (the house, dressed)
  const FELT = '#26543a', FELT_RIM = '#3a7a55', WOOD = '#4a3826', METAL = '#3a4250';
  function rrect(x, y, w, h, r, fill, stroke) {
    const px = x*T, py = y*T, pw = w*T, ph = h*T;
    ctx.beginPath();
    ctx.moveTo(px+r, py);
    ctx.arcTo(px+pw, py, px+pw, py+ph, r); ctx.arcTo(px+pw, py+ph, px, py+ph, r);
    ctx.arcTo(px, py+ph, px, py, r); ctx.arcTo(px, py, px+pw, py, r); ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.stroke(); }
  }
  function label(s, x, y) {
    if (!s) return;
    ctx.fillStyle = 'rgba(190,205,220,0.5)'; ctx.font = '7px Menlo';
    ctx.fillText(s, x*T, y*T);
  }
  function drawFurniture(view) {
    const items = (furniture.floors && furniture.floors[view]) || [];
    for (const it of items) {
      if (it.type === 'ring') {
        rrect(it.x, it.y, it.w, it.h, 3, '#2a3344', '#46586e');           // mat
        for (let i = 1; i <= 3; i++) {                                     // ropes
          ctx.strokeStyle = `rgba(200,210,230,${0.35 - i*0.06})`; ctx.lineWidth = 1;
          ctx.strokeRect((it.x+0.4*i)*T, (it.y+0.4*i)*T, (it.w-0.8*i)*T, (it.h-0.8*i)*T);
        }
        for (const [cx, cy] of [[it.x,it.y],[it.x+it.w,it.y],[it.x,it.y+it.h],[it.x+it.w,it.y+it.h]]) {
          ctx.fillStyle = '#8a93a8'; ctx.beginPath(); ctx.arc(cx*T, cy*T, 2.5, 0, 7); ctx.fill();
        }
        label(it.label, it.x + it.w*0.32, it.y + it.h*0.55);
      } else if (it.type === 'counter') {
        rrect(it.x, it.y, it.w, it.h, 2, WOOD, '#6a5238'); label(it.label, it.x+0.3, it.y+0.8);
      } else if (it.type === 'desk') {
        rrect(it.x, it.y, it.w, it.h, 1.5, METAL, '#5a6478'); label(it.label, it.x+0.3, it.y+0.8);
      } else if (it.type === 'felt') {
        rrect(it.x, it.y, it.w, it.h, 2, FELT, FELT_RIM); label(it.label, it.x+0.2, it.y+0.9);
      } else if (it.type === 'table') {
        ctx.fillStyle = FELT; ctx.beginPath(); ctx.arc((it.x)*T, (it.y)*T, it.r*T, 0, 7); ctx.fill();
        ctx.strokeStyle = FELT_RIM; ctx.lineWidth = 1.2; ctx.stroke();
        if (it.label) label(it.label, it.x - it.r, it.y - it.r - 0.2);
      } else if (it.type === 'slots') {
        const gap = it.gap || 2;
        for (let c = 0; c < it.cols; c++) for (let r = 0; r < it.rows; r++)
          rrect(it.x + c*gap, it.y + r*1.4, 1.2, 1.0, 1, '#3a2f4a', '#6a5a7e');
        label(it.label, it.x - 0.2, it.y - 0.4);
      } else if (it.type === 'bleacher') {
        rrect(it.x, it.y, it.w, it.h, 1, '#33384a', '#525a72');           // the stand
        ctx.strokeStyle = '#5a637e'; ctx.lineWidth = 1;
        const horiz = it.face === 'N' || it.face === 'S';
        const tiers = horiz ? it.h : it.w;
        for (let i = 1; i < tiers; i++) {                                 // tier steps
          ctx.beginPath();
          if (horiz) { ctx.moveTo(it.x*T, (it.y+i)*T); ctx.lineTo((it.x+it.w)*T, (it.y+i)*T); }
          else       { ctx.moveTo((it.x+i)*T, it.y*T); ctx.lineTo((it.x+i)*T, (it.y+it.h)*T); }
          ctx.stroke();
        }
        if (it.label) label(it.label, it.x + 0.3, it.y + 0.9);
      } else if (it.type === 'seats') {
        for (let sx = 0; sx < it.w; sx++) for (let sy = 0; sy < it.h; sy++)
          rrect(it.x + sx + 0.12, it.y + sy + 0.12, 0.76, 0.76, 1, '#3d4456', '#5a637e');  // a chair each
      }
    }
  }

  function draw() {
    const g = world.grid(levels, view);
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      ctx.fillStyle = TILE_COL[g[y][x]] || '#23252e';
      ctx.fillRect(x * T, y * T, T, T);
    }
    ctx.font = 'bold 9px Menlo'; ctx.fillStyle = 'rgba(150,170,190,0.45)';
    for (const [name, r] of Object.entries(rooms.floors[view].rooms))
      ctx.fillText(name.toUpperCase().replace('_',' '), (r.rect[0]+0.4)*T, (r.rect[1]+1.2)*T);

    drawFurniture(view);

    // customers — the crowd, as little black dots (floor 1 only)
    customers.filter(c => c.floor === view).forEach(c => {
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(c.x * T, c.y * T, T * 0.38, 0, 7); ctx.fill();
      ctx.strokeStyle = 'rgba(180,190,205,0.3)'; ctx.lineWidth = 1; ctx.stroke();
    });

    // cameras
    cams.filter(c => c.floor === view).forEach(c => {
      if (c.on) cone(c.x+0.5, c.y+0.5, c.facing, c.fov, c.range, view, 'rgba(255,200,60,0.16)');
      ctx.fillStyle = c.on ? '#fc3' : '#555';
      ctx.beginPath(); ctx.arc((c.x+0.5)*T,(c.y+0.5)*T,4,0,7); ctx.fill();
    });

    // guard cones, target lines, dots
    guards.filter(gd => gd.floor === view).forEach(gd => {
      cone(gd.x, gd.y, gd.facing, gd.fov, gd.range, view, gd.state==='SCAN'?'rgba(255,120,120,0.22)':'rgba(255,120,120,0.12)');
      if (gd.roamTarget) polyline([gd.roamTarget], gd, 'rgba(255,90,90,0.18)', 1, [3,6]);
      if (gd.path && gd.pi < gd.path.length) polyline(gd.path.slice(gd.pi), gd, 'rgba(255,100,100,0.35)', 1.5, [4,4]);
      ctx.fillStyle = '#d34a4a'; ctx.beginPath(); ctx.arc(gd.x*T,gd.y*T,T*0.4,0,7); ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.2; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(gd.x*T,gd.y*T);
      ctx.lineTo((gd.x+Math.cos(gd.facing)*0.6)*T,(gd.y+Math.sin(gd.facing)*0.6)*T); ctx.stroke();
    });

    // staff: dot + suspicion ring (they don't catch — they escalate)
    staff.filter(s => s.floor === view).forEach(s => {
      const sx = s.x * T, sy = s.y * T;
      if (s.suspicion > 0.02) {
        const col = s.suspicion > 0.66 ? '255,90,90' : s.suspicion > 0.33 ? '236,184,76' : '120,200,140';
        ctx.strokeStyle = `rgba(${col},0.8)`; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(sx, sy, T * 0.55, -Math.PI / 2, -Math.PI / 2 + s.suspicion * Math.PI * 2); ctx.stroke();
      }
      ctx.fillStyle = s.color;
      ctx.beginPath(); ctx.arc(sx, sy, T * 0.3, 0, 7); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.stroke();
      if (s.state === 'ALERTING') { ctx.fillStyle = '#ff5555'; ctx.font = 'bold 11px Menlo'; ctx.fillText('!', sx - 2, sy - T * 0.5); }
    });

    // crew: candidate routes (scored), chosen path, dot
    crew.filter(c => c.floor === view).forEach(c => {
      if (showRoutes && c.debugRoutes) {
        c.debugRoutes.filter(r => !r.chosen).forEach(r => {
          if (!r.path || r.path.length < 2) return;
          ctx.strokeStyle='rgba(210,90,90,0.18)'; ctx.lineWidth=1; ctx.setLineDash([2,4]);
          ctx.beginPath(); ctx.moveTo(r.path[0].x*T, r.path[0].y*T);
          r.path.forEach(p => ctx.lineTo(p.x*T, p.y*T)); ctx.stroke(); ctx.setLineDash([]);
          const m = r.path[(r.path.length/2)|0];
          ctx.fillStyle='rgba(210,90,90,0.5)'; ctx.font='7px Menlo';
          ctx.fillText(`${r.name}:${r.score.toFixed(0)}`, m.x*T, m.y*T-2);
        });
        const ch = c.debugRoutes.find(r => r.chosen);
        if (ch && ch.path && ch.path.length > 1) {
          ctx.strokeStyle='rgba(80,230,150,0.6)'; ctx.lineWidth=2.5; ctx.setLineDash([6,3]);
          ctx.beginPath(); ctx.moveTo(ch.path[0].x*T, ch.path[0].y*T);
          ch.path.forEach(p => ctx.lineTo(p.x*T, p.y*T)); ctx.stroke(); ctx.setLineDash([]);
          const m = ch.path[(ch.path.length/2)|0];
          ctx.fillStyle='rgba(80,230,150,0.9)'; ctx.font='bold 8px Menlo';
          ctx.fillText(`✓${ch.name}:${ch.score.toFixed(0)}`, m.x*T, m.y*T-4);
        }
      } else if (c.path && c.pi < c.path.length) {
        polyline(c.path.slice(c.pi), c, c.color, 2, [4,4]);
      }
      ctx.fillStyle=c.color; ctx.beginPath(); ctx.arc(c.x*T,c.y*T,T*0.38,0,7); ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.3; ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font='bold 8px Menlo'; ctx.fillText(c.name, c.x*T-6, c.y*T-T*0.55);
    });
  }

  function panel() {
    const tcol = t => t > 50 ? '#ff7070' : t > 20 ? '#e6b84c' : '#6b8494';
    // HEIST STATE — alarm meter, CELESTE's relay, who's spotted
    const apct = Math.round(heist.alarm * 100);
    const acol = heist.caught ? '#ff4444' : heist.alarm > 0.5 ? '#ff7070' : heist.alarm > 0.15 ? '#e6b84c' : '#67c97a';
    let h = `<h2>THE HOUSE</h2>
      <div class="row"><span style="color:#aab">alarm</span>
        <span style="color:${acol}">${heist.caught ? '🚨 CAUGHT' : apct + '%'}</span></div>
      <div style="height:6px;background:#1b2530;border-radius:3px;margin:3px 0;overflow:hidden">
        <div style="height:100%;width:${apct}%;background:${acol}"></div></div>
      <div class="row"><span style="color:#aab">CELESTE console</span>
        <span style="color:${heist.consoleHeld ? '#67c97a' : '#566'}">${heist.consoleHeld ? '🟢 seized' : '— not yet'}</span></div>
      <div class="row"><span style="color:#aab">blackout relay</span>
        <span style="color:${heist.darkCam ? '#7fd4ff' : '#566'}">${heist.darkCam || '—'}</span></div>
      ${heist.spotted.length ? `<div style="color:#ff8888;font-size:10px;margin-top:2px">👁 spotted: ${heist.spotted.join(', ')}</div>` : ''}`;
    h += '<h2>CREW — thinking</h2>';
    for (const c of crew) {
      const t = Math.round(threatAt(levels, c.floor, c.x, c.y, guards, cams, c.role === 'conductor'));
      h += `<div style="margin-bottom:6px">
        <span style="color:${c.color};font-weight:bold">${c.name}</span>
        <span style="color:#5a6b78"> ${c.floor}</span>
        ${c.routeType ? `<span style="color:#5fb6d6">[${c.routeType}]</span>` : ''}
        <span style="color:${tcol(t)};float:right">⚠${t}</span>
        <div class="think">${c.action || '…'}</div>
        ${c.routeOptions ? `<div style="color:#4a5a66;font-size:10px">${c.routeOptions}</div>` : ''}
      </div>`;
    }
    const gap = securityGapOpen(guards);
    h += `<h2>SECURITY ROOM</h2><div class="row"><span style="color:#aab">G-SEC post</span>
          <span style="color:${gap ? '#67c97a' : '#e6b84c'}">${gap ? '🟢 GAP — unwatched' : '🔒 manned'}</span></div>`;
    h += '<h2>GUARDS</h2>';
    for (const gd of guards) {
      const st = gd.state === 'BREAK' || gd.state === 'TO_BREAK' ? '🚻 break'
               : gd.state === 'SCAN' ? '👀 scan' : gd.path ? '🚶 patrol' : '⏸';
      h += `<div class="row"><span style="color:#d88">${gd.id} <span style="color:#566">${gd.floor}</span></span>
            <span style="color:#788">${st}</span></div>`;
    }
    h += '<h2>STAFF — suspicion</h2>';
    for (const s of staff) {
      const pct = Math.round(s.suspicion * 100);
      const col = s.state === 'ALERTING' ? '#ff5555' : s.suspicion > 0.33 ? '#e6b84c' : '#7fa0b0';
      h += `<div class="row"><span style="color:${s.color}">${s.id}</span>
            <span style="color:${col}">${s.state === 'ALERTING' ? '🚨 CALLED' : pct + '%'}</span></div>`;
    }
    if (simctx.securityCalled) {
      const last = simctx.calls[simctx.calls.length - 1];
      h = `<div style="background:#3a1414;border:1px solid #d44;border-radius:5px;padding:6px;margin-bottom:8px;color:#ff8888">
        🚨 SECURITY CALLED ×${simctx.calls.length}<br>
        <span style="font-size:10px;color:#c99">last: ${last.by} @ ${last.loc.x},${last.loc.y}</span>
      </div>` + h;
    }
    h += '<h2>CAMERAS</h2>';
    for (const c of cams)
      h += `<div class="row"><span style="color:#aa9">${c.id} <span style="color:#566">${c.floor}</span></span>
            <span style="color:${c.on?'#fc3':'#666'}">${c.on?'● live':'○ dark'}</span></div>`;
    document.getElementById('panel').innerHTML = h;
  }

  function loop() {
    if (!paused) {
      if (failBeat > 0) {                 // CAUGHT — hold a beat, then start over
        if (--failBeat === 0) { attempt++; frame = 0; resetRun(); }
      } else {
        simctx.frame = frame;
        stepGuards(levels, guards, rng);
        stepStaffAll(levels, rooms, staff, crew, guards, rng, simctx);
        stepCrew(levels, rooms, crew, guards, cams, heist);
        stepCustomers(levels, rooms, customers, rng);
        stepHeist(heist, levels, rooms, crew, guards, cams);
        if (heist.caught) failBeat = 110;  // ~1.8s showing the bust, then restart
        frame++;
      }
    }
    draw(); panel();
    const st = heist.caught ? `🚨 CAUGHT — restarting…  ·  attempt ${attempt}`
                            : `attempt ${attempt} · frame ${frame} · ${view}`;
    document.getElementById('status').textContent = st;
    requestAnimationFrame(loop);
  }
  loop();
} catch (e) { err.textContent = 'Failed: ' + (e && e.stack || e); }
</script>
</body>
</html>
