<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>THE HOUSE — Casino 3D</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/three@0.137.5/build/three.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html,body,#root{ height:100%; margin:0; background:#0e0e16; }
  #err{ color:#ff8888; font-family:Menlo,monospace; font-size:13px;
        white-space:pre-wrap; padding:20px; }
</style>
</head>
<body>
<div id="root"></div>
<pre id="err"></pre>
<script>
// Load the canonical Casino3D.jsx, strip module syntax, transpile JSX in the
// browser, and mount it. Single source of truth = design/Casino3D.jsx.
(async () => {
  try {
    const src = await (await fetch('./Casino3D.jsx?' + Date.now())).text();
    let code = src
      .replace(/^\s*import[^\n]*\n/gm, '')                  // drop ES imports
      .replace('export default function Casino3D', 'function Casino3D');
    code =
      'const {useEffect, useRef, useState} = React;\n' +
      code +
      '\nReactDOM.createRoot(document.getElementById("root"))' +
      '.render(React.createElement(Casino3D));';
    const out = Babel.transform(code, { presets: ['react'] }).code;
    const s = document.createElement('script');
    s.textContent = out;
    document.body.appendChild(s);
  } catch (e) {
    document.getElementById('err').textContent =
      'Failed to load Casino3D.jsx:\n' + (e && e.stack || e);
  }
})();
</script>
</body>
</html>
